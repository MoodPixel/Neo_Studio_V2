<section class="neo-ip-adapter-panel" data-extension-id="image.ip_adapter" data-workspace-app="reference" data-route-aware="true" data-route-state="available" data-display-mode="guided" data-display-modes="compact guided expert">
  <header class="neo-ip-adapter-panel__header">
    <div><strong>IP Adapter / FaceID</strong><span class="neo-muted">Built-in Reference extension</span></div>
    <div class="neo-extension-status-line"><span class="neo-workflow-chip disabled">Disabled</span><span class="neo-state-pill">No active units</span></div>
  </header>
  <div class="neo-ip-adapter-toolbar">
    <label class="neo-toggle-row"><input type="checkbox" id="ipAdapterEnabled"> <span>Apply IP Adapter</span></label>
    <button class="neo-btn secondary" type="button" id="ipAdapterAddUnit">+ Add Unit</button>
    <button class="neo-btn secondary" type="button" id="ipAdapterPrepIdentity">Prep Identity</button>
  </div>
  <div class="neo-ip-adapter-identity" data-ip-adapter-section="identity-presets" data-display-section="guided-identity"></div>
  <div class="neo-ip-adapter-units" data-ip-adapter-section="units"></div>
</section>
